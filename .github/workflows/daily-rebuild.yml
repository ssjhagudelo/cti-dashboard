name: Daily CTI Dashboard Rebuild

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 01:00 AM Colombia
  workflow_dispatch:        # Lanzar manualmente desde GitHub Actions
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tu repositorio
        uses: actions/checkout@v4.2.2

      - name: Clonar deepdarkCTI (fuente de datos)
        run: |
          git clone --depth=1 https://github.com/fastfire/deepdarkCTI.git /tmp/deepdarkcti
          echo "Archivos disponibles:"
          ls /tmp/deepdarkcti/*.md

      - name: Generar index.html con datos embebidos
        run: |
          python3 << 'EOF'
          import re, json, os
          from datetime import datetime, timezone

          def first_url(s):
              m = re.search(r'https?://[^\s)"\|>]+', s or '')
              return m.group(0).rstrip('.,;>)') if m else ''

          def parse_md_table(filepath):
              try:
                  with open(filepath, encoding='utf-8', errors='ignore') as f:
                      text = f.read()
              except:
                  return []
              entries = []
              lines = text.strip().split('\n')
              headers = []
              seen_sep = False
              for line in lines:
                  line = line.strip()
                  if not line:
                      seen_sep = False; headers = []; continue
                  if re.match(r'^\|[\s\-:|]+\|', line):
                      seen_sep = True; continue
                  if not (line.startswith('|') and line.endswith('|')):
                      if seen_sep: seen_sep = False; headers = []
                      continue
                  cells = [c.strip() for c in line[1:-1].split('|')]
                  if not seen_sep:
                      headers = [re.sub(r'[^a-z0-9]+','_', c.lower()).strip('_') for c in cells]
                      continue
                  row = {headers[i] if i < len(headers) else f'_{i}': cells[i] for i in range(len(cells))}
                  name_cell = row.get('name') or row.get('telegram') or row.get('_0', '')
                  md = re.search(r'\[([^\]]+)\]\(([^)]+)\)', name_cell)
                  name = md.group(1) if md else re.sub(r'<[^>]+>','', name_cell).strip()
                  url  = md.group(2) if md else first_url(name_cell) or first_url(row.get('_1',''))
                  status_raw = (row.get('status') or row.get('_1') or '').upper()
                  status = ('online'  if any(x in status_raw for x in ['ONLINE','VALID']) else
                            'offline' if any(x in status_raw for x in ['OFFLINE','EXPIRED']) else 'unknown')
                  channel = (row.get('tox_id_or_other_channel') or row.get('threat_actor_name') or
                             row.get('_2') or row.get('_3') or '')
                  channel = re.sub(r'<[^>]+>','',channel).strip()
                  if not name and not url: continue
                  entries.append({'name': name, 'url': url, 'status': status, 'channel': channel})
              return entries

          files = {
              'ransomware': '/tmp/deepdarkcti/ransomware_gang.md',
              'telegram':   '/tmp/deepdarkcti/telegram_threat_actors.md',
              'forum':      '/tmp/deepdarkcti/forum.md',
              'stealer':    '/tmp/deepdarkcti/telegram_infostealer.md',
              'maas':       '/tmp/deepdarkcti/maas.md',
          }

          all_data = {}
          for key, path in files.items():
              data = parse_md_table(path)
              all_data[key] = data
              print(f"  {key}: {len(data)} entradas")

          build_ts = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          data_js  = json.dumps(all_data, ensure_ascii=False)
          total    = sum(len(v) for v in all_data.values())
          print(f"  TOTAL: {total} entradas | Build: {build_ts}")

          # Guardar metadata
          os.makedirs('docs', exist_ok=True)
          with open('docs/metadata.json', 'w') as f:
              json.dump({'last_updated': build_ts, 'total': total,
                         'counts': {k: len(v) for k,v in all_data.items()}}, f)

          # Leer template HTML y reemplazar placeholder de datos
          with open('template.html', 'r', encoding='utf-8') as f:
              template = f.read()

          output = template.replace('__BUILD_TS__', build_ts).replace('__DATA_JSON__', data_js)

          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(output)

          size_kb = os.path.getsize('docs/index.html') / 1024
          print(f"  docs/index.html generado: {size_kb:.0f} KB")
          EOF

      - name: Commit y push
        run: |
          git config user.name  "CTI Bot"
          git config user.email "cti-bot@noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: rebuild CTI dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: (Opcional) Notificar webhook n8n
        if: ${{ vars.N8N_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"event\":\"cti_rebuild\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" || true
