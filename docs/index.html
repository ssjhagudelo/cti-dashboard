<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTI · Threat Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0c0c12;
    --surface2: #13131c;
    --border: #1e1e2e;
    --accent: #e63946;
    --accent2: #ff6b35;
    --accent3: #06d6a0;
    --accent4: #ffd166;
    --blue: #4361ee;
    --text: #e8e8f0;
    --muted: #6e6e8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
    pointer-events:none;
    z-index:1000;
  }
  header {
    border-bottom:1px solid var(--border);
    padding:0 32px;
    display:flex; align-items:center; justify-content:space-between;
    height:64px; position:sticky; top:0;
    background:rgba(5,5,8,0.97); backdrop-filter:blur(12px); z-index:100;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:32px; height:32px; background:var(--accent);
    clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    animation:pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100%{box-shadow:0 0 0 0 rgba(230,57,70,0)}
    50%{box-shadow:0 0 20px 4px rgba(230,57,70,0.4)}
  }
  .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; letter-spacing:.05em; }
  .logo-text span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:16px; }
  .live-dot { width:8px; height:8px; background:var(--accent3); border-radius:50%; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  #lastUpdated { color:var(--muted); font-size:11px; }

  .container { max-width:1440px; margin:0 auto; padding:28px 32px; }

  /* Stats */
  .stats-bar { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:28px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:16px; position:relative; overflow:hidden; transition:border-color .2s;
  }
  .stat-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
  .stat-card.c1::before{background:var(--accent)}
  .stat-card.c2::before{background:var(--accent2)}
  .stat-card.c3::before{background:var(--accent3)}
  .stat-card.c4::before{background:var(--accent4)}
  .stat-card.c5::before{background:var(--blue)}
  .stat-card:hover{border-color:rgba(255,255,255,.15)}
  .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; }
  .stat-value { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; line-height:1; }
  .stat-card.c1 .stat-value{color:var(--accent)}
  .stat-card.c2 .stat-value{color:var(--accent2)}
  .stat-card.c3 .stat-value{color:var(--accent3)}
  .stat-card.c4 .stat-value{color:var(--accent4)}
  .stat-card.c5 .stat-value{color:var(--blue)}

  /* Tabs */
  .tab-nav { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; overflow-x:auto; }
  .tab-btn {
    background:none; border:none; color:var(--muted); cursor:pointer;
    padding:12px 18px; font-family:'Space Mono',monospace; font-size:11px;
    text-transform:uppercase; letter-spacing:.08em;
    border-bottom:2px solid transparent; transition:all .2s;
    white-space:nowrap; display:flex; align-items:center; gap:8px;
  }
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-count { background:rgba(255,255,255,.06); color:var(--muted); padding:2px 6px; border-radius:2px; font-size:10px; }
  .tab-btn.active .tab-count{background:rgba(230,57,70,.15);color:var(--accent)}

  /* Toolbar */
  .toolbar { display:flex; gap:10px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
  .search-wrap { flex:1; min-width:200px; position:relative; }
  .search-wrap::before { content:'⌕'; position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; }
  input[type="text"] {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:4px; color:var(--text); font-family:'Space Mono',monospace;
    font-size:12px; padding:9px 12px 9px 36px; outline:none; transition:border-color .2s;
  }
  input[type="text"]:focus{border-color:var(--accent)}
  input[type="text"]::placeholder{color:var(--muted)}
  .filter-btn {
    background:var(--surface); border:1px solid var(--border); color:var(--muted);
    cursor:pointer; padding:9px 12px; border-radius:4px;
    font-family:'Space Mono',monospace; font-size:11px;
    display:flex; align-items:center; gap:5px; transition:all .2s; white-space:nowrap;
  }
  .filter-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
  .filter-btn.active-on{border-color:var(--accent3);color:var(--accent3)}
  .filter-btn.active-off{border-color:var(--muted);color:var(--text)}
  .filter-btn.active-all{border-color:var(--blue);color:var(--blue)}

  /* Panels */
  .data-panel{display:none}
  .data-panel.active{display:block}

  /* Error banner */
  .error-banner{
    background:rgba(230,57,70,.08); border:1px solid rgba(230,57,70,.25);
    border-radius:4px; padding:12px 16px; margin-bottom:16px;
    color:var(--accent); font-size:12px; display:none;
  }
  .error-banner.show{display:block}

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th {
    background:var(--surface2); padding:9px 14px; text-align:left;
    font-size:10px; text-transform:uppercase; letter-spacing:.1em;
    color:var(--muted); border-bottom:1px solid var(--border);
  }
  tbody tr { border-bottom:1px solid rgba(255,255,255,.04); transition:background .1s; }
  tbody tr:hover{background:rgba(255,255,255,.03)}
  tbody tr:last-child{border-bottom:none}
  td{padding:9px 14px;vertical-align:middle;font-size:12px}
  .badge { display:inline-block; padding:2px 7px; border-radius:2px; font-size:10px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; }
  .b-online{background:rgba(6,214,160,.15);color:var(--accent3)}
  .b-offline{background:rgba(255,255,255,.05);color:var(--muted)}
  .b-unknown{background:rgba(255,209,102,.12);color:var(--accent4)}
  .entry-name{font-weight:700;color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entry-url{color:var(--muted);font-size:11px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entry-url a{color:inherit;text-decoration:none;transition:color .2s}
  .entry-url a:hover{color:var(--accent)}
  .entry-ch{color:var(--muted);font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Loading */
  .loading-state{padding:56px 24px;text-align:center;color:var(--muted)}
  .loader{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:12px;display:block;margin-bottom:4px}
  .loading-sub{font-size:10px;color:rgba(110,110,138,.55)}

  .empty-state{padding:56px 24px;text-align:center;color:var(--muted);font-size:12px}

  /* Pagination */
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  .page-btns{display:flex;gap:4px;flex-wrap:wrap}
  .page-btn{
    background:var(--surface2);border:1px solid var(--border);color:var(--muted);
    cursor:pointer;padding:3px 9px;border-radius:2px;
    font-family:'Space Mono',monospace;font-size:11px;transition:all .15s;
  }
  .page-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
  .page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

  footer{
    border-top:1px solid var(--border);padding:18px 32px;
    display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:11px;margin-top:40px;
  }
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">deep<span>dark</span>CTI</div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <div id="lastUpdated">Inicializando…</div>
  </div>
</header>

<div class="container">

  <div class="stats-bar">
    <div class="stat-card c1"><div class="stat-label">Ransomware Gangs</div><div class="stat-value" id="cnt-ransomware">—</div></div>
    <div class="stat-card c2"><div class="stat-label">Telegram Actors</div><div class="stat-value" id="cnt-telegram">—</div></div>
    <div class="stat-card c3"><div class="stat-label">Leak Sites</div><div class="stat-value" id="cnt-leak">—</div></div>
    <div class="stat-card c4"><div class="stat-label">Infostealers</div><div class="stat-value" id="cnt-stealer">—</div></div>
    <div class="stat-card c5"><div class="stat-label">MaaS / RaaS</div><div class="stat-value" id="cnt-maas">—</div></div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="ransomware">◈ Ransomware Gangs <span class="tab-count" id="tc-ransomware">…</span></button>
    <button class="tab-btn" data-tab="telegram">◈ Telegram Actors <span class="tab-count" id="tc-telegram">…</span></button>
    <button class="tab-btn" data-tab="leak">◈ Leak Sites <span class="tab-count" id="tc-leak">…</span></button>
    <button class="tab-btn" data-tab="stealer">◈ Infostealers <span class="tab-count" id="tc-stealer">…</span></button>
    <button class="tab-btn" data-tab="maas">◈ MaaS / RaaS <span class="tab-count" id="tc-maas">…</span></button>
  </div>

  <div id="errorBanner" class="error-banner"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar por nombre, URL, canal…">
    </div>
    <button class="filter-btn" data-filter="online">● Online</button>
    <button class="filter-btn" data-filter="offline">○ Offline</button>
    <button class="filter-btn active-all" data-filter="all">Todos</button>
  </div>

  <div id="panel-ransomware" class="data-panel active"></div>
  <div id="panel-telegram" class="data-panel"></div>
  <div id="panel-leak" class="data-panel"></div>
  <div id="panel-stealer" class="data-panel"></div>
  <div id="panel-maas" class="data-panel"></div>

</div>

<footer>
  <span>Fuente: <a href="https://github.com/fastfire/deepdarkCTI" target="_blank">github.com/fastfire/deepdarkCTI</a> — Solo uso CTI defensivo</span>
  <span id="buildTs"></span>
</footer>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
// jsDelivr sirve GitHub como CDN con CORS abierto — soluciona el problema principal
const CDN  = 'https://cdn.jsdelivr.net/gh/fastfire/deepdarkCTI@main';
const GHRAW = 'https://raw.githubusercontent.com/fastfire/deepdarkCTI/main';
const GHAPI = 'https://api.github.com/repos/fastfire/deepdarkCTI/contents';

const SOURCES = {
  ransomware: 'ransomware_gang.md',
  telegram:   'telegram_threat_actors.md',
  leak:       'leak_sites.md',
  stealer:    'telegram_infostealer.md',
  maas:       'maas.md',
};

const PAGE_SIZE = 75;

const ST = {
  data:   { ransomware:[], telegram:[], leak:[], stealer:[], maas:[] },
  tab:    'ransomware',
  query:  '',
  filter: 'all',
  pages:  { ransomware:1, telegram:1, leak:1, stealer:1, maas:1 },
};

// ── Fetch con 3 fallbacks ─────────────────────────────────────────────────────
async function fetchText(tab) {
  const f = SOURCES[tab];
  const attempts = [
    () => fetch(`${CDN}/${f}`,   { cache:'no-store' }).then(r => r.ok ? r.text() : Promise.reject()),
    () => fetch(`${GHRAW}/${f}`, { cache:'no-store' }).then(r => r.ok ? r.text() : Promise.reject()),
    () => fetch(`${GHAPI}/${f}`)
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(j => j.content ? atob(j.content.replace(/\n/g,'')) : Promise.reject()),
  ];
  for (const fn of attempts) {
    try { return await fn(); } catch(_) {}
  }
  return null;
}

// ── Parser de tablas Markdown ─────────────────────────────────────────────────
// Formato real del repo:
//   | Name | Status | User:Password | Tox ID or other channel | RSS Feed |
//   | ---- | ------ | ------------- | ----------------------- | -------- |
//   | [LockBit](http://...) | ONLINE | | tox:xxx | |
function parseTable(text, tab) {
  const entries = [];
  const lines = text.split('\n');
  let headers = [];
  let seenSep = false;

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) { seenSep = false; headers = []; continue; }

    // Separador de tabla: | --- | --- |
    if (/^\|[\s\-:|]+\|/.test(line)) {
      seenSep = true;
      continue;
    }

    if (!line.startsWith('|') || !line.endsWith('|')) {
      if (seenSep) { seenSep = false; headers = []; }
      continue;
    }

    const cells = line.slice(1,-1).split('|').map(c => c.trim());

    if (!seenSep) {
      // Cabecera
      headers = cells.map(c =>
        c.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')
      );
      continue;
    }

    // Fila de datos
    const row = {};
    cells.forEach((c,i) => { row[headers[i] || `_${i}`] = c; });

    // Nombre + URL
    const nameCell = row.name || row._0 || '';
    const md = nameCell.match(/\[([^\]]+)\]\(([^)]+)\)/);
    const name = md ? md[1] : nameCell.replace(/<[^>]+>/g,'').trim();
    const url  = md ? md[2] : (firstUrl(nameCell) || firstUrl(row._1 || '') || '');

    // Estado
    const st = (row.status || row._1 || '').toUpperCase();
    const status = st.includes('ONLINE')  ? 'online'
                 : st.includes('OFFLINE') ? 'offline' : 'unknown';

    // Canal de comunicación (columna 4 o similar)
    const channel = row.tox_id_or_other_channel
                 || row.communication_channel
                 || row.channel
                 || row._3 || '';

    if (!name && !url) continue;
    entries.push({ name, url, status, channel, tab });
  }
  return entries;
}

function firstUrl(s) {
  const m = (s||'').match(/https?:\/\/[^\s)"]+/);
  return m ? m[0].replace(/[,;.>)]+$/,'') : '';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function badge(s) {
  return s==='online'  ? '<span class="badge b-online">● Online</span>'
       : s==='offline' ? '<span class="badge b-offline">○ Offline</span>'
       :                 '<span class="badge b-unknown">? —</span>';
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPanel(tab) {
  const panel = document.getElementById(`panel-${tab}`);
  let items = ST.data[tab] || [];

  if (ST.filter !== 'all') items = items.filter(i => i.status === ST.filter);
  if (ST.query) {
    const q = ST.query.toLowerCase();
    items = items.filter(i =>
      (i.name||'').toLowerCase().includes(q) ||
      (i.url||'').toLowerCase().includes(q)  ||
      (i.channel||'').toLowerCase().includes(q)
    );
  }

  if (!items.length) {
    panel.innerHTML = '<div class="empty-state">Sin entradas con los filtros actuales.</div>';
    return;
  }

  const total = items.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const page = Math.max(1, Math.min(ST.pages[tab], totalPages));
  ST.pages[tab] = page;
  const slice = items.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  const rows = slice.map(it => `<tr>
    <td><div class="entry-name" title="${esc(it.name)}">${esc(it.name)}</div></td>
    <td><div class="entry-url">${it.url ? `<a href="${esc(it.url)}" target="_blank" rel="noopener noreferrer">${esc(it.url)}</a>` : '—'}</div></td>
    <td><div class="entry-ch" title="${esc(it.channel)}">${esc(it.channel)||'—'}</div></td>
    <td>${badge(it.status)}</td>
  </tr>`).join('');

  let pageHtml = '';
  if (totalPages > 1) {
    const btns = [];
    const range = [...new Set([1, page-1, page, page+1, totalPages].filter(p => p>=1 && p<=totalPages))].sort((a,b)=>a-b);
    let prev = 0;
    for (const p of range) {
      if (prev && p - prev > 1) btns.push('<span style="color:var(--muted);padding:0 4px">…</span>');
      btns.push(`<button class="page-btn${p===page?' active':''}" data-page="${p}" data-tab="${tab}">${p}</button>`);
      prev = p;
    }
    pageHtml = `<div class="pagination">
      <span>${(page-1)*PAGE_SIZE+1}–${Math.min(page*PAGE_SIZE,total)} de ${total}</span>
      <div class="page-btns">${btns.join('')}</div>
    </div>`;
  } else {
    pageHtml = `<div class="pagination"><span>${total} entradas</span></div>`;
  }

  panel.innerHTML = `<div class="table-wrap">
    <table>
      <thead><tr><th>Nombre / Grupo</th><th>URL / Endpoint</th><th>Canal / Contacto</th><th>Estado</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${pageHtml}
  </div>`;
}

function updateCounts() {
  for (const tab of Object.keys(ST.data)) {
    const n = ST.data[tab].length;
    document.getElementById(`cnt-${tab}`).textContent = n ? n.toLocaleString('es-CO') : '—';
    document.getElementById(`tc-${tab}`).textContent  = n;
  }
}

// ── Carga ─────────────────────────────────────────────────────────────────────
async function loadAll() {
  for (const tab of Object.keys(SOURCES)) {
    document.getElementById(`panel-${tab}`).innerHTML = `
      <div class="loading-state">
        <div class="loader"></div>
        <span class="loading-text">Descargando datos desde jsDelivr CDN…</span>
        <span class="loading-sub">${CDN}/${SOURCES[tab]}</span>
      </div>`;
  }

  const errors = [];
  await Promise.all(Object.keys(SOURCES).map(async tab => {
    const text = await fetchText(tab);
    if (!text) { errors.push(tab); ST.data[tab] = []; return; }
    ST.data[tab] = parseTable(text, tab);
  }));

  updateCounts();
  renderPanel(ST.tab);

  if (errors.length) {
    const b = document.getElementById('errorBanner');
    b.textContent = `⚠ No se pudieron cargar: ${errors.join(', ')}. Intenta refrescar.`;
    b.classList.add('show');
  }

  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    `Actualizado: ${now.toLocaleDateString('es-CO')} ${now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('buildTs').textContent =
    `Build: ${now.toISOString().slice(0,19).replace('T',' ')} UTC`;
}

// ── Eventos ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
  ST.tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.data-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${ST.tab}`).classList.add('active');
  renderPanel(ST.tab);
}));

document.getElementById('searchInput').addEventListener('input', e => {
  ST.query = e.target.value;
  Object.keys(ST.pages).forEach(t => ST.pages[t]=1);
  renderPanel(ST.tab);
});

document.querySelectorAll('[data-filter]').forEach(btn => btn.addEventListener('click', () => {
  ST.filter = btn.dataset.filter;
  document.querySelectorAll('[data-filter]').forEach(b => {
    b.classList.remove('active-on','active-off','active-all');
  });
  const cls = ST.filter==='online'?'active-on':ST.filter==='offline'?'active-off':'active-all';
  btn.classList.add(cls);
  Object.keys(ST.pages).forEach(t => ST.pages[t]=1);
  renderPanel(ST.tab);
}));

document.addEventListener('click', e => {
  if (!e.target.classList.contains('page-btn')) return;
  const { tab, page } = e.target.dataset;
  ST.pages[tab] = parseInt(page);
  renderPanel(tab);
  document.getElementById(`panel-${tab}`).scrollIntoView({behavior:'smooth',block:'start'});
});

loadAll();
</script>
</body>
</html>
