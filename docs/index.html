", "status": "online", "channel": "", "extra": ""}, {"name": "STEALER VIRUS", "url": "https://t.me/erna_channel", "status": "online", "channel": "", "extra": ""}]};
const PS = 80;
const ST = {tab:'ransomware', q:'', f:'all', pages:{ransomware:1,telegram:1,forum:1,stealer:1,maas:1}};

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const badge = s => s==='online' ? '<span class="badge bo">● Online</span>' : s==='offline' ? '<span class="badge bf">○ Offline</span>' : '<span class="badge bu">? —</span>';

function render(tab) {
  const panel = document.getElementById('panel-'+tab);
  let items = DATA[tab] || [];
  if (ST.f !== 'all') items = items.filter(i => i.status === ST.f);
  if (ST.q) {
    const q = ST.q.toLowerCase();
    items = items.filter(i => (i.name||'').toLowerCase().includes(q)||(i.url||'').toLowerCase().includes(q)||(i.channel||'').toLowerCase().includes(q));
  }
  if (!items.length) { panel.innerHTML='<div class="empty">Sin entradas con los filtros actuales.</div>'; return; }
  const total = items.length;
  const tp = Math.ceil(total/PS);
  const pg = Math.max(1, Math.min(ST.pages[tab]||1, tp));
  ST.pages[tab] = pg;
  const slice = items.slice((pg-1)*PS, pg*PS);
  const rows = slice.map(it => `<tr>
    <td><div class="nm" title="${esc(it.name)}">${esc(it.name)}</div></td>
    <td><div class="ur">${it.url?`<a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.url)}</a>`:'—'}</div></td>
    <td><div class="ch" title="${esc(it.channel)}">${esc(it.channel)||'—'}</div></td>
    <td>${badge(it.status)}</td>
  </tr>`).join('');
  let pgHtml = '';
  if (tp > 1) {
    const pts = [...new Set([1,pg-1,pg,pg+1,tp].filter(p=>p>=1&&p<=tp))].sort((a,b)=>a-b);
    let prev=0, btns=[];
    for (const p of pts) {
      if (prev && p-prev>1) btns.push('<span style="color:var(--mu);padding:0 4px">…</span>');
      btns.push(`<button class="pb${p===pg?' active':''}" data-page="${p}" data-tab="${tab}">${p}</button>`);
      prev=p;
    }
    pgHtml = `<div class="pg"><span>${(pg-1)*PS+1}–${Math.min(pg*PS,total)} de ${total}</span><div class="pbs">${btns.join('')}</div></div>`;
  } else {
    pgHtml = `<div class="pg"><span>${total} entradas</span></div>`;
  }
  panel.innerHTML = `<div class="tw"><table><thead><tr><th>Nombre / Actor</th><th>URL / Endpoint</th><th>Canal / Contacto</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table>${pgHtml}</div>`;
}

document.querySelectorAll('.tb').forEach(b => b.addEventListener('click', () => {
  ST.tab = b.dataset.tab;
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('panel-'+ST.tab).classList.add('active');
  render(ST.tab);
}));

document.getElementById('q').addEventListener('input', e => {
  ST.q = e.target.value;
  Object.keys(ST.pages).forEach(t=>ST.pages[t]=1);
  render(ST.tab);
});

document.querySelectorAll('[data-f]').forEach(b => b.addEventListener('click', () => {
  ST.f = b.dataset.f;
  document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('fa'));
  b.classList.add('fa');
  Object.keys(ST.pages).forEach(t=>ST.pages[t]=1);
  render(ST.tab);
}));

document.addEventListener('click', e => {
  if (!e.target.classList.contains('pb')) return;
  const {tab, page} = e.target.dataset;
  ST.pages[tab] = parseInt(page);
  render(tab);
  document.getElementById('panel-'+tab).scrollIntoView({behavior:'smooth',block:'start'});
});

render(ST.tab);
</script>
